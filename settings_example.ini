[FTP]
# Path to local directory (or directories, comma-separated for multi-source upload)
# Examples:
#   Single:   LOCAL_DIRECTORY = c:\ftp_backup
#   Multiple: LOCAL_DIRECTORY = c:\folder1, c:\folder2
LOCAL_DIRECTORY = c:\ftp_backup
FTP_DIRECTORY = 
FTP_HOST = server.com
FTP_USER = user
FTP_PASS = password

# Direction of sync: down = FTP to local, up = local to FTP
# Note: multiple LOCAL_DIRECTORY paths only work with DIRECTION = up
DIRECTION = down

# Number of concurrent uploads or downloads (default: 1)
CONCURRENT_UPLOADS_OR_DOWNLOADS = 1
