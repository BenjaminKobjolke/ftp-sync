[FTP]
# Upload with hash-based change detection
# Only uploads files whose content actually changed (tracked via local SQLite DB)
# Much faster than scanning FTP for large projects
LOCAL_DIRECTORY = c:\my_website
FTP_DIRECTORY = /public_html
FTP_HOST = server.com
FTP_USER = user
FTP_PASS = password

DIRECTION = up
HASH_CACHE_FILE = c:\my_website\.ftp_sync_cache.db
