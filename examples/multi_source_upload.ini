[FTP]
# Upload from multiple local folders into one FTP directory
# When the same file exists in both folders, the newer version wins
LOCAL_DIRECTORY = c:\project_src, c:\project_assets
FTP_DIRECTORY = /public_html
FTP_HOST = server.com
FTP_USER = user
FTP_PASS = password

DIRECTION = up
HASH_CACHE_FILE = c:\project_src\.ftp_sync_cache.db
